<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nekonečná Poznávačka</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        img { 
			width: 100%; 
			height: 300px; /* Můžete zvětšit na 350px nebo 400px podle potřeby */
			border-radius: 15px; 
			object-fit: contain; /* TATO ZMĚNA zajistí, že bude vidět celý obrázek */
			margin-bottom: 1rem; 
			background: #fdfdfd; /* Jemné pozadí, kdyby byl obrázek úzký */
		}
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; margin-top: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #msg { margin-top: 15px; margin-bottom: 10px; font-weight: bold; font-size: 1.2rem; min-height: 20px; line-height: 1.4; transition: all 0.3s;}
        #info { color: gray; font-size: 0.8rem; margin-top: 10px; }
		.card { 
			display: flex; 
			flex-direction: column; 
			gap: 10px; /* Vytvoří stejné mezery mezi prvky */
		}
		#msg { 
			margin: 0; 
			padding: 10px 0;
			order: 1; /* Zpráva bude úplně nahoře */
		}
		#info { 
			order: 2; /* Info o pokusech bude pod zprávou */
		}
		#pic { 
			order: 3; /* Obrázek pod info texty */
		}
		#input-area {
			order: 4; /* Vstupní pole a tlačítko úplně dole */
		}
        .back-link {
            display: block; /* Zajistí, že odkaz zabere celou šířku a umožní zarovnání */
            text-align: left; /* Tlačí text odkazu doleva */
            margin-bottom: 20px;
            text-decoration: none;
            color: #888;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="card">
    <a href="https://fierce-dog.github.io/poznavacky_linktree/" class="back-link">⬅ Zpět na rozcestí</a>
    <p id="msg">Máš 3 pokusy</p>
    <p id="info"></p>
    <img id="pic" src="" alt="Načítám...">
    <div id="input-area">
        <input type="text" id="guess-name" placeholder="Druh česky (např. pes domácí)" autocomplete="off"
            onkeypress="if(event.key === 'Enter') check()">
        <input type="text" id="guess-order" placeholder="Řád latinsky (např. carnivora)" autocomplete="off" style="margin-top: 10px;"
            style="margin-top: 10px; background-color: #eee;" disabled
            onkeypress="if(event.key === 'Enter') check()">
        <button onclick="check()" id="check-btn" style="margin-top: 10px;">Odeslat</button>
    </div>
</div>

<script>
    // --- VAŠE DATA ---
    const items = [
        { file: "Predobratlovci/zaludovec_maly.jpg", name: "Žaludovec malý", order: "Hemichordata" },
        { file: "Predobratlovci/lilijice_stredomorska.jpg", name: "Lilijice středomořská", order: "Echinodermata" },
        { file: "Predobratlovci/hvezdice_tvrda.jpg", name: "Hvězdice tvrdá", order: "Echinodermata" },
        { file: "Predobratlovci/jezovka_velka.jpg", name: "Ježovka velká", order: "Echinodermata" },
        { file: "Predobratlovci/sumys_forsskaluv.jpg", name: "Sumýš Forsskalův", order: "Echinodermata" },
        { file: "Kruhousti_paryby/mihule_potocni.jpg", name: "Mihule potoční", order: "Petromyzontiformes" },
        { file: "Kruhousti_paryby/chimera_beloskvrnna.jpg", name: "Chiméra běloskvrnná", order: "Chimaeriformes" },
        { file: "Kruhousti_paryby/ruznozubec_portjacksonsky.jpg", name: "Různozubec portjacksonský", order: "Heterodontiformes" },
        { file: "Kruhousti_paryby/zralok_vouskaty.jpg", name: "Žralok vouskatý", order: "Orectolobiformes" },
        { file: "Kruhousti_paryby/zralok_velrybi.jpg", name: "Žralok velrybí", order: "Orectolobiformes" },
        { file: "Kruhousti_paryby/zralok_bily.jpg", name: "Žralok bílý", order: "Lamniformes" },
        { file: "Kruhousti_paryby/liskoun_obecny.jpg", name: "Liškoun obecný", order: "Lamniformes" },
        { file: "Kruhousti_paryby/zralok_sotek.jpg", name: "Žralok šotek", order: "Lamniformes" },
        { file: "Kruhousti_paryby/macka_skvrnita.jpg", name: "Máčka skvrnitá", order: "Carcharhiniformes" },
        { file: "Kruhousti_paryby/kladivoun_velky.jpg", name: "Kladivoun velký", order: "Carcharhiniformes" },
        { file: "Kruhousti_paryby/piloun_obecny.jpg", name: "Piloun obecný", order: "Pristiformes" },
        { file: "Kruhousti_paryby/pilohreb_obecny.jpg", name: "Pilohřeb obecný", order: "Pristiformes" },
        { file: "Kruhousti_paryby/pilonos_vouskaty.jpg", name: "Pilonos vouskatý", order: "Pristiophoriformes" },
        { file: "Kruhousti_paryby/rejnok_ostnaty.jpg", name: "Rejnok ostnatý", order: "Rajiformes" },
        { file: "Kruhousti_paryby/trnucha_obecna.jpg", name: "Trnucha obecná", order: "Myliobatiformes" },
        { file: "Kruhousti_paryby/manta_atlantska.jpg", name: "Manta atlantská", order: "Myliobatiformes" },
        { file: "Ryby/uhor_ricni.jpg", name: "Úhoř řícní", order: "Anguilliformes" },
        { file: "Ryby/murena_obecna.jpg", name: "Muréna obecná", order: "Anguilliformes" },
        { file: "Ryby/sardel_peruanska.jpg", name: "Sardel peruánská", order: "Clupeiformes" },
        { file: "Ryby/latimerie_podivna.jpg", name: "Latimérie podivná", order: "Coelacanthiformes" },
        { file: "Ryby/kapr_obecny.jpg", name: "Kapr obecný", order: "Cypriniformes" },
        { file: "Ryby/plotice_obecna.jpg", name: "Plotice obecná", order: "Cypriniformes" },
        { file: "Ryby/piskor_pruhovany.jpg", name: "Piskoř pruhovaný", order: "Cypriniformes" },
        { file: "Ryby/pirana_obecna.jpg", name: "Piraňa obecná", order: "Characiformes" },
        { file: "Ryby/tetra_neonova.jpg", name: "Tetra neonová", order: "Characiformes" },
        { file: "Ryby/sumec_velky.jpg", name: "Sumec velký", order: "Siluriformes" },
        { file: "Ryby/sumecek_americky.jpg", name: "Sumeček americký", order: "Siluriformes" },
        { file: "Ryby/stika_obecna.jpg", name: "Štika obecná", order: "Esociformes" },
        { file: "Ryby/pstruh_obecny.jpg", name: "Pstruh obecný", order: "Salmoniformes" },
        { file: "Ryby/lipan_podhorni.jpg", name: "Lipan podhorní", order: "Salmoniformes" },
        { file: "Ryby/mnik_jednovousy.jpg", name: "Mník jednovousý", order: "Gadiformes" },
        { file: "Ryby/zivorodka_duhova.jpg", name: "Živorodka duhová", order: "Cypridontiformes" },
        { file: "Ryby/konicek_teckovany.jpg", name: "Koníček tečkovaný", order: "Gasterosteiformes" },
        { file: "Ryby/okoun_ricni.jpg", name: "Okoun říční", order: "Perciformes" },
        { file: "Ryby/candat_obecny.jpg", name: "Candát obecný", order: "Perciformes" },
        { file: "Ryby/tunak_obecny.jpg", name: "Tuňák obecný", order: "Perciformes" },
        { file: "Ryby/jezik_obecny.jpg", name: "Ježík obecný", order: "Tetraodontiformes" },
        { file: "Ryby/platys_velky.jpg", name: "Platýs velký", order: "Pleuronectiformes" },
        { file: "Ryby/arapaima_velka.jpg", name: "Arapaima velká", order: "Osteoglossiformes" },
        { file: "Ryby/mesicnik_svitivy.jpg", name: "Měsíčník svítivý", order: "Tetraodontiformes" },
        { file: "Ryby/veslonos_americky.jpg", name: "Veslonos americký", order: "Acipenseriformes" },
        { file: "Ryby/jeseter_maly.jpg", name: "Jeseter malý", order: "Acipenseriformes" }
    ];

    let current;
    let attempts = 0; 
    let phase = 1; 
    let pool = [...items]; // Musíme pool naplnit hned na začátku

    function next() {
        const msgField = document.getElementById("msg");
        const picField = document.getElementById("pic");
        const inName = document.getElementById("guess-name");
        const inOrder = document.getElementById("guess-order");

        // 1. KONTROLA POOLU (Tohle ti chybělo)
        if (pool.length === 0) {
            pool = [...items]; // Restart kola
        }

        // 2. VÝBĚR OBRÁZKU
        const idx = Math.floor(Math.random() * pool.length);
        current = pool[idx];
        picField.src = current.file;

        // 3. RESET STAVU
        phase = 1; 
        attempts = 0;

        inName.value = "";
        inName.disabled = false;
        inName.style.backgroundColor = "white";
        inName.style.borderColor = "#ddd";
        inName.style.color = "black";      // Vrátí barvu písma na černou
        inName.style.fontWeight = "normal"; // Vrátí písmo z tučného na normální
        
        inOrder.value = "";
        inOrder.disabled = true;
        inOrder.style.backgroundColor = "#eee";
        inOrder.style.borderColor = "#ddd";
        inOrder.style.color = "black";
        inOrder.style.fontWeight = "normal";

        msgField.innerText = "Poznej druh";
        msgField.style.color = "#333";
        
        inName.focus();
        updateInfo();
    }

    function updateInfo() {
        // Kontrola, zda prvek info existuje
        const infoField = document.getElementById("info");
        if(infoField) {
            infoField.innerText = `Zbývá v kole: ${pool.length} | Pokus: ${attempts + 1}/3`;
            infoField.style.color = "#666";
        }
    }

    function check() {
        // Pokud z nějakého důvodu neběží hra, nic nedělej
        if (!current) return;

        const inName = document.getElementById("guess-name");
        const inOrder = document.getElementById("guess-order");
        const msgField = document.getElementById("msg");

        if (phase === 1) {
            const val = inName.value.trim().toLowerCase();
            if (val === current.name.toLowerCase()) {
            successPhase1(true); // Uhodnuto
        } else {
            attempts++;
            if (attempts < 3) {
                msgField.innerText = "✗ Špatný druh, zkus to znovu!";
                inName.value = "";
                inName.focus();
            } else {
                successPhase1(false); // Neuhodnuto po 3 pokusech
            }
        }
        } else {
            const val = inOrder.value.trim().toLowerCase();
        if (val === current.order.toLowerCase()) {
            successPhase2(true);
        } else {
            attempts++;
            if (attempts < 3) {
                msgField.innerText = "✗ Špatný řád, zkus to znovu!";
                inOrder.value = "";
                inOrder.focus();
            } else {
                successPhase2(false);
            }
        }
        }
        updateInfo();
    }

    function successPhase1(wasCorrect) {
        const inName = document.getElementById("guess-name");
        const inOrder = document.getElementById("guess-order");
        
        inName.value = current.name;
        inName.disabled = true;

        if (wasCorrect) {
            inName.style.backgroundColor = "#e8f5e9"; // Zelená
            inName.style.borderColor = "green";
            inName.style.color = "green";
            inName.style.fontWeight = "bold";
        } else {
            inName.style.backgroundColor = "#ffebee"; // Světle červená
            inName.style.borderColor = "red";
            inName.style.color = "red";
            inName.style.fontWeight = "bold";
        }
        
        phase = 2;
        attempts = 0; 
        inOrder.disabled = false;
        inOrder.style.backgroundColor = "white";
        inOrder.focus();
        document.getElementById("msg").innerText = wasCorrect ? "Výborně! Teď řád:" : "Pamatuj si druh. Teď řád:";
    }

    function successPhase2(wasCorrect) {
        const inOrder = document.getElementById("guess-order");
        const msgField = document.getElementById("msg");

        inOrder.value = current.order;
        inOrder.disabled = true;

        if (wasCorrect) {
            inOrder.style.backgroundColor = "#e8f5e9";
            inOrder.style.borderColor = "green";
            inOrder.style.color = "green";
            inOrder.style.fontWeight = "bold";
            msgField.innerText = "✓ Kompletní!";
            msgField.style.color = "green";
        } else {
            inOrder.style.backgroundColor = "#ffebee";
            inOrder.style.borderColor = "red";
            inOrder.style.color = "red";
            inOrder.style.fontWeight = "bold";
            msgField.innerText = "Tady máš správné odpovědi...";
            msgField.style.color = "red";
        }
        
        pool = pool.filter(i => i !== current);

        // ČASOVÁNÍ: Pokud bylo něco špatně, počkáme 5 sekund (5000ms), jinak 2 sekundy (2000ms)
        let delay = wasCorrect ? 2000 : 5000;
        
        // Malý trik: Pokud jsi neuhádl už to PRVNÍ políčko, taky dáme delší čas
        const inName = document.getElementById("guess-name");
        if (inName.style.borderColor === "red") delay = 5000;

        setTimeout(next, delay);
    }

    // Nastartování hry
    next();
</script>
</body>
</html>
